architecture:
  # Pure data graph plus concept hierarchy for TileFlow-Ascend.
  # Resource nodes participate in data routing. Concept nodes describe
  # placement domains and multiplicity for spatial tile decomposition.
  version: 0.5-ascend-concept-graph

  nodes:
  - name: GM
    kind: buffer
    class: DRAM
    role: out
    attributes:
      word-bits: 16

  - name: L1
    kind: buffer
    class: SRAM
    attributes:
      word-bits: 16

  - name: L0
    kind: buffer
    class: SRAM
    attributes:
      word-bits: 16

  - name: UB
    kind: buffer
    class: SRAM
    attributes:
      word-bits: 16

  - name: Cube
    kind: compute
    class: Cube
    attributes:
      primitive: matmul16x16x16

  - name: Vec
    kind: compute
    class: Vec
    attributes:
      primitive: elementwise_exp

  - name: CubeCore
    kind: concept
    contains:
    - ref: L1
    - ref: L0
    - ref: Cube
    roles:
      input_buffer: L1
      compute_buffer: L0
      compute: Cube

  - name: VecCore
    kind: concept
    contains:
    - ref: UB
    - ref: Vec
    roles:
      compute_buffer: UB
      compute: Vec

  - name: AICore
    kind: concept
    contains:
    - ref: CubeCore
      count: 1
    - ref: VecCore
      count: 2

  - name: Device
    kind: concept
    contains:
    - ref: GM
      count: 1
    - ref: AICore
      count: 24
    roles:
      global_buffer: GM

  edges:
  - name: gm_to_l1
    from: GM
    to: L1
    kind: load

  - name: l1_to_l0
    from: L1
    to: L0
    kind: load

  - name: l0_to_gm_bypass
    from: L0
    to: GM
    kind: bypass

  - name: gm_to_ub
    from: GM
    to: UB
    kind: load

  - name: ub_to_gm
    from: UB
    to: GM
    kind: store
