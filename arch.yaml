architecture:
  # Resource instance nodes participate in data routing. Concept nodes describe
  # placement domains and multiplicity for spatial tile decomposition.
  version: 0.6-ascend-split-concept-graph

  nodes:
  - name: GM
    kind: buffer
    class: DRAM
    role: out
    count: 1
    attributes:
      size: 17179869184

  - name: L1
    kind: buffer
    class: SRAM
    count: 1
    attributes:
      size: 1048576

  - name: L0
    kind: buffer
    class: SRAM
    count: 1
    attributes:
      size: 65536

  - name: UB
    kind: buffer
    class: SRAM
    count: 1
    attributes:
      size: 262144

  - name: Cube
    kind: compute
    class: Cube
    count: 1
    attributes:
      primitive: matmul16x16x16

  - name: Vec
    kind: compute
    class: Vec
    count: 1
    attributes:
      primitive: elementwise_exp

  concepts:
  - name: CubeCore
    contains:
    - ref: L1
    - ref: L0
    - ref: Cube

  - name: VecCore
    contains:
    - ref: UB
    - ref: Vec

  - name: AICore
    contains:
    - ref: CubeCore
      count: 1
    - ref: VecCore
      count: 2

  - name: Device
    contains:
    - ref: GM
      count: 1
    - ref: AICore
      count: 24

  edges:
  - name: gm_to_l1
    from: GM
    to: L1
    kind: load

  - name: l1_to_l0
    from: L1
    to: L0
    kind: load

  - name: l0_to_cube
    from: L0
    to: Cube
    kind: load

  - name: cube_to_l0
    from: Cube
    to: L0
    kind: compute

  - name: l0_to_gm_bypass
    from: L0
    to: GM
    kind: bypass

  - name: gm_to_ub
    from: GM
    to: UB
    kind: load

  - name: ub_to_vec
    from: UB
    to: Vec
    kind: load

  - name: vec_to_ub
    from: Vec
    to: UB
    kind: compute

  - name: ub_to_gm
    from: UB
    to: GM
    kind: store
